services:
  postgres:
    image: postgres:16-alpine
    container_name: albion-guild-db
    environment:
      POSTGRES_DB: albion_guild
      POSTGRES_USER: albion
      POSTGRES_PASSWORD: albion_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albion -d albion_guild"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: albion-guild-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker

volumes:
  postgres_data:
