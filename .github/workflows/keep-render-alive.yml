name: Keep Render alive

on:
  schedule:
    # Render free duerme tras ~15 min sin tráfico
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "RENDER_BACKEND_URL secret not set — skip"
            exit 0
          fi
          curl -fsS --max-time 120 "${BACKEND_URL%/}/api/health"
          echo ""
          echo "OK — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
